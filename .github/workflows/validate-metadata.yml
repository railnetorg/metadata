name: Validate Metadata JSON

on:
  push:
    paths:
      - 'production/metadata.json'
      - 'staging/metadata.json'
  pull_request:
    paths:
      - 'production/metadata.json'
      - 'staging/metadata.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate production/metadata.json
        run: jq empty production/metadata.json

      - name: Validate staging/metadata.json
        run: jq empty staging/metadata.json
